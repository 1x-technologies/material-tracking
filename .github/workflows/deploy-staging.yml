name: Deploy to Sandbox

on:
  push:
    branches: [sandbox]

permissions:
  contents: read
  id-token: write

env:
  FIREBASE_PROJECT: sandbox
  GCP_PROJECT: material-tracking-sandbox
  CLOUD_RUN_SERVICE: material-tracking-api
  CLOUD_RUN_REGION: us-central1
  CLOUD_RUN_MIN_INSTANCES: 0

jobs:
  test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test

  deploy:
    name: Deploy to Sandbox
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.SANDBOX_WIF_PROVIDER }}
          service_account: ${{ secrets.SANDBOX_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm run build
          pnpm run build:functions
          pnpm run build:api
        env:
          VITE_FIREBASE_API_KEY: AIzaSyChtj98hPj-2NdE1rsiH6r3sgGOdBeEaHo
          VITE_FIREBASE_PROJECT_ID: material-tracking-sandbox
          VITE_FIREBASE_AUTH_DOMAIN: material-tracking-sandbox.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: material-tracking-sandbox.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "44270624723"
          VITE_FIREBASE_APP_ID: 1:44270624723:web:e38f83b0a65330a4915926
          VITE_FIREBASE_ENV: sandbox

      - name: Install functions dependencies
        run: cd apps/functions/dist && npm install

      - name: Deploy Firebase (hosting, functions, rules, indexes)
        run: npx firebase deploy --only hosting,functions,firestore,storage --project ${{ env.FIREBASE_PROJECT }}

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --source=apps/api \
            --region=${{ env.CLOUD_RUN_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --min-instances=${{ env.CLOUD_RUN_MIN_INSTANCES }} \
            --max-instances=10 \
            --set-env-vars="GCLOUD_PROJECT=${{ env.GCP_PROJECT }},NODE_ENV=sandbox,CORS_ORIGINS=https://material-tracking-sandbox.web.app,ALLOWED_EMAIL_DOMAIN=1x.tech"
