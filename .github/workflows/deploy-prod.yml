name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  FIREBASE_PROJECT: prod
  GCP_PROJECT: material-tracking-prod
  CLOUD_RUN_SERVICE: material-tracking-api
  CLOUD_RUN_REGION: us-central1
  CLOUD_RUN_MIN_INSTANCES: 1

jobs:
  test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.PROD_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm run build
          pnpm run build:functions
          pnpm run build:api
        env:
          VITE_FIREBASE_API_KEY: AIzaSyCnxutaVir7ISooXxNKOS8Bb35OM6k41cc
          VITE_FIREBASE_PROJECT_ID: material-tracking-prod
          VITE_FIREBASE_AUTH_DOMAIN: material-tracking-prod.firebaseapp.com
          VITE_FIREBASE_STORAGE_BUCKET: material-tracking-prod.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "35182195230"
          VITE_FIREBASE_APP_ID: 1:35182195230:web:5f3de6da7ce310b236b40f
          VITE_FIREBASE_ENV: production

      - name: Install functions dependencies
        run: cd apps/functions/dist && npm install

      - name: Deploy Firebase (hosting, functions, rules, indexes)
        run: npx firebase deploy --only hosting,functions,firestore,storage --project ${{ env.FIREBASE_PROJECT }}

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --source=apps/api \
            --region=${{ env.CLOUD_RUN_REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --min-instances=${{ env.CLOUD_RUN_MIN_INSTANCES }} \
            --max-instances=10 \
            --set-env-vars="GCLOUD_PROJECT=${{ env.GCP_PROJECT }},NODE_ENV=production,CORS_ORIGINS=https://material-tracking-prod.web.app,ALLOWED_EMAIL_DOMAIN=1x.tech"
